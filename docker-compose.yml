services:
  # ─────────────────────────────────
  # 🎨 FRONTEND — Next.js
  # ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: /api
    ports:
      # cx23 already uses port 3000 (Plokymarket nginx), 3003 (admin
      # vhost). CryptoFlip frontend exposed on 3002.
      - "3002:3000"
    env_file:
      - ./.admin-gateway.env
    environment:
      # NEXT_PUBLIC_API_URL is what the browser bundle uses.
      # For same-host deploy (nginx reverse proxy) this is a relative path.
      - NEXT_PUBLIC_API_URL=/api
      # NEXT_PUBLIC_SOCKET_URL intentionally omitted —
      # socket.ts derives from window.location.origin at runtime.
      # INTERNAL_API_URL is the docker-network hostname the
      # /api/[...path] catch-all proxy uses to reach the backend
      # from inside the frontend container. NEXT_PUBLIC_API_URL
      # stays as localhost:4000 because that's what the browser
      # bundle uses (the dev works off cx23 over SSH tunnel).
      - INTERNAL_API_URL=http://backend:4000
      # Admin path + gateway token. These are passed at container
      # creation (see compose-with-secrets.py wrapper) so the
      # middleware can validate the X-Admin-Gateway header and
      # next.config.js can mount the secret rewrite. Both are
      # read from /root/.admin-gateway-token and /root/coin-master/
      # .admin-secret-path (chmod 600).
      # NOTE: ADMIN_SECRET_PATH and ADMIN_GATEWAY_TOKEN are read from
      # .admin-gateway.env (chmod 600, not in repo) so the live token
      # can be changed without rebuilding the image.
    # Production image has standalone build baked in; do NOT mount host
    # source over it or server.js and .next/static will disappear.
    volumes: []
    depends_on:
      - backend
    networks:
      - cryptoflip-network

  # ─────────────────────────────────
  # ⚙️ BACKEND — Node.js + Socket.io
  # ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_HOST=redis
      # CSRF middleware uses NEXT_PUBLIC_APP_URL as the allowed Origin.
      # Must match the actual frontend URL (host port 3002 on cx23).
      - NEXT_PUBLIC_APP_URL=http://localhost:3002
      # Tunnel URL used for public browser access during dev testing.
      # This is added dynamically to the CSRF allowlist by the proxy.
      - TUNNEL_APP_URL=${TUNNEL_APP_URL:-}
      # Allow the external IP / hostnames for dev testing from outside the VM.
      # In production, set EXTRA_ALLOWED_ORIGINS from .env (comma-separated).
      # Public host so CORS/CSRF allows same-host different-port origins
      # (e.g. admin gateway on :3003 talking to frontend/API on :3002).
      - HOST=${HOST:-localhost}
      # IPs to bypass the geoip jurisdiction block. The operator's
      # exit IP (e.g. via a proxy/CDN) may geo-locate to a blocked
      # region (IR, US, etc.) even when the operator is legitimate.
      - GEOIP_ALLOWLIST=${GEOIP_ALLOWLIST:-}
      # Dev: allow admin login without 2FA so smoke tests can run end-to-end.
      # Production should set this to 'true' or remove the override entirely.
      - ADMIN_2FA_REQUIRED=${ADMIN_2FA_REQUIRED:-true}
    # volumes:
    #   # Host mount disabled for production — the image already contains
    #   # the compiled dist/ from the multi-stage Dockerfile builder.
    #   # Uncomment for local development with hot-reload only.
    #   - ./backend:/app
    #   - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cryptoflip-network
    restart: unless-stopped

  # ─────────────────────────────────
  # 🗄️ DATABASE — PostgreSQL
  # ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    # ports: removed — host postgres uses 5432 (Plokymarket); no host port mapping needed
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptoflip-network

  # ─────────────────────────────────
  # ⚡ CACHE — Redis
  # INTERNAL ONLY: No host port mapping. Backend accesses via
  # Docker network (redis:6379). Password auth required.
  # ─────────────────────────────────
  redis:
    image: redis:7-alpine
    # Host port 6379 intentionally NOT mapped — Redis is internal-only.
    # Access from host for debugging: docker exec -it coin-master-redis-1 redis-cli -a $REDIS_PASSWORD
    command: >
      sh -c "redis-server
      --requirepass $${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptoflip-network

  # ─────────────────────────────────
  # 🖥️ DB ADMIN UI — pgAdmin
  # ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      - postgres
    networks:
      - cryptoflip-network

  # ─────────────────────────────────
  # 🌐 REVERSE PROXY — Nginx
  # (Production এ ব্যবহার করুন)
  # ─────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - cryptoflip-network
    profiles:
      - production  # শুধু production-এ চালু হবে

volumes:
  postgres_data:
  redis_data:

networks:
  cryptoflip-network:
    driver: bridge
