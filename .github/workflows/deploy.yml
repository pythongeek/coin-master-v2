name: Production Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: cryptoflip_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd frontend && npm ci
        cd ../backend && npm ci

    - name: Run lint
      run: |
        cd frontend && npm run lint
        cd ../backend && npm run lint
      continue-on-error: true

    - name: Run unit and integration tests
      run: |
        cd frontend && npm run test:ci
        cd ../backend && npm run test:ci
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cryptoflip_test
        REDIS_URL: redis://localhost:6379
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: testsecret
        NODE_ENV: test

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Registry
      uses: docker/login-action@v3
      with:
        registry: your-registry.com
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          your-registry.com/cryptoflip-frontend:${{ github.sha }}
          your-registry.com/cryptoflip-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          your-registry.com/cryptoflip-api:${{ github.sha }}
          your-registry.com/cryptoflip-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: Setup Helm
      uses: azure/setup-helm@v3

    - name: Deploy to Kubernetes
      run: |
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

        # Update image tags
        kubectl set image deployment/cryptoflip-frontend frontend=your-registry.com/cryptoflip-frontend:${{ github.sha }} -n production
        kubectl set image deployment/cryptoflip-api api=your-registry.com/cryptoflip-api:${{ github.sha }} -n production

        # Wait for rollout
        kubectl rollout status deployment/cryptoflip-frontend -n production
        kubectl rollout status deployment/cryptoflip-api -n production

    - name: Run smoke tests
      run: |
        curl -f https://yourgame.com/api/health
        curl -f https://api.yourgame.com/health
