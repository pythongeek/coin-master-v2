name: Deploy to cx23

# Deploys the freshly-built images to the cx23 production host over SSH.
# Triggered automatically when CI passes on main, or manually via workflow_dispatch.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch / SHA)'
        required: false
        default: 'main'

concurrency:
  group: deploy-cx23
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success')
    environment: production
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CX23_SSH_KEY }}" > ~/.ssh/cx23_key
          chmod 600 ~/.ssh/cx23_key
          ssh-keyscan -H "${{ secrets.CX23_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via ssh
        run: |
          ssh -i ~/.ssh/cx23_key -o StrictHostKeyChecking=accept-new \
            "root@${{ secrets.CX23_HOST }}" \
            "cd /root/coin-master && git fetch --all && git reset --hard origin/main && docker compose up -d --build frontend backend && sleep 8 && curl -fsS https://crazycoin.duckdns.org/api/health >/dev/null && curl -fsS https://crazycoin.duckdns.org/health >/dev/null && docker ps --format 'table {{.Names}}\t{{.Status}}'"