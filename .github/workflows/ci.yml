name: CI — বিল্ড ও যাচাই

# এই workflow প্রতিবার push বা pull request এ স্বয়ংক্রিয়ভাবে চলবে
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════
  #  FRONTEND — Next.js বিল্ড যাচাই
  # ═══════════════════════════════════════════════════════════
  frontend-build:
    name: Frontend বিল্ড চেক
    runs-on: ubuntu-latest
    steps:
      - name: কোড চেকআউট
        uses: actions/checkout@v4

      - name: Node.js সেটআপ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Dependencies ইন্সটল
        working-directory: ./frontend
        run: npm ci

      - name: Lint চেক
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: TypeScript বিল্ড
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
        run: npm run build

  # ═══════════════════════════════════════════════════════════
  #  BACKEND — TypeScript কম্পাইল যাচাই
  # ═══════════════════════════════════════════════════════════
  backend-build:
    name: Backend বিল্ড চেক
    runs-on: ubuntu-latest
    steps:
      - name: কোড চেকআউট
        uses: actions/checkout@v4

      - name: Node.js সেটআপ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Dependencies ইন্সটল
        working-directory: ./backend
        run: npm ci

      - name: TypeScript কম্পাইল চেক
        working-directory: ./backend
        run: npm run build

  # ═══════════════════════════════════════════════════════════
  #  DOCKER — Dockerfile ভ্যালিড কিনা যাচাই
  # ═══════════════════════════════════════════════════════════
  docker-build:
    name: Docker ইমেজ বিল্ড চেক
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    steps:
      - name: কোড চেকআউট
        uses: actions/checkout@v4

      - name: Docker Buildx সেটআপ
        uses: docker/setup-buildx-action@v3

      - name: Frontend ইমেজ বিল্ড (টেস্ট)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          target: production

      - name: Backend ইমেজ বিল্ড (টেস্ট)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          target: production
