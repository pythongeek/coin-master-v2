name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── BACKEND ─────────────────────────────────────────────────
  backend:
    name: Backend (lint + typecheck + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  # ─── FRONTEND ────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test:ci
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://crazycoin.duckdns.org
          NEXT_PUBLIC_APP_URL: https://crazycoin.duckdns.org
          NEXT_PUBLIC_SOCKET_URL: wss://crazycoin.duckdns.org
        run: npm run build

  # ─── DOCKER ──────────────────────────────────────────────────
  docker:
    name: Docker image build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          target: production
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          target: production