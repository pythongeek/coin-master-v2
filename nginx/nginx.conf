events {
  worker_connections 1024;
}

http {
  # ─── Rate Limiting ────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

  # ─── Upstream Servers ─────────────────────────────
  upstream frontend {
    server frontend:3000;
  }

  upstream backend {
    server backend:4000;
  }

  # ─── Main Server ──────────────────────────────────
  server {
    listen 80;
    server_name localhost;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend (Next.js)
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Cloudflare/CDN-friendly cache headers for immutable static assets.
    # The frontend hashes JS/CSS files with long hashes, so these can be
    # cached by a CDN edge for a very long time. Cloudflare page rules
    # can also be set to cache /_next/static/* and /icons/* at the edge.
    location ~* /_next/static/ {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      add_header X-CDN-Cache "static" always;
      access_log off;
    }

    location ~* /(manifest\.json|sw\.js|icons/.*\.png)$ {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    }

    # Backend API
    location /api {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Socket.io (WebSocket)
    location /socket.io {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;    # 24 ঘণ্টা কানেকশন ধরে রাখা
    }
  }
}
