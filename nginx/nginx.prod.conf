events {
  worker_connections 1024;
}

http {
  # ─── Rate Limiting ────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

  # ─── Upstream Servers ─────────────────────────────
  upstream frontend {
    server frontend:3000;
  }

  upstream backend {
    server backend:4000;
  }

  # ─── HTTP → HTTPS রিডাইরেক্ট ───────────────────────
  server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt সার্টিফিকেট ভেরিফিকেশনের জন্য
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # বাকি সব ট্রাফিক HTTPS-এ পাঠাও
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS মেইন সার্ভার ─────────────────────────────
  server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL সার্টিফিকেট (Certbot স্বয়ংক্রিয়ভাবে রিনিউ করবে)
    ssl_certificate     /etc/nginx/ssl/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── নিরাপত্তা হেডার ─────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;

    # ── ফ্রন্টএন্ড (Next.js) ────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ── ব্যাকএন্ড API (রেট লিমিট সহ) ──────────────────
    location /api {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── লগইন এন্ডপয়েন্ট — আরো কড়া রেট লিমিট (ব্রুট ফোর্স প্রতিরোধ) ──
    location /api/auth/login {
      limit_req zone=login_limit burst=3 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Socket.io (WebSocket) ──────────────────────────
    location /socket.io {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400;
    }

    # ── অজানা ফাইল এক্সটেনশন ব্লক করো (নিরাপত্তা) ──────
    location ~* \.(env|git|sql|log)$ {
      deny all;
      return 404;
    }
  }
}
