version: '3.9'

# ═══════════════════════════════════════════════════════════════
#  PRODUCTION DOCKER COMPOSE — Ubuntu VPS-এ লাইভ চালানোর জন্য
# ═══════════════════════════════════════════════════════════════
#  ব্যবহার: docker compose -f docker-compose.prod.yml up -d --build
# ═══════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────
  # 🎨 FRONTEND — Next.js (Production Build)
  # ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    depends_on:
      - backend
    networks:
      - cryptoflip-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────
  # ⚙️ BACKEND — Node.js (Production Build)
  # ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - cryptoflip-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────
  # 🗃️ MIGRATIONS — one-shot Job
  # ─────────────────────────────────
  # See docker-compose.yml for full rationale. This is the prod-side
  # equivalent — one-shot container that runs `npm run migrate` (via
  # the compiled CLI at dist/scripts/run-migrations.js) before the
  # backend starts. Exits 0 on success; non-zero prevents the
  # backend from booting at all.
  # ─────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    command: ["node", "dist/scripts/run-migrations.js", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cryptoflip-network
    restart: "no"

  # ─────────────────────────────────
  # 🗄️ DATABASE — PostgreSQL
  # ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backups:/backups
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptoflip-network
    # গুরুত্বপূর্ণ: প্রোডাকশনে পোর্ট বাইরে এক্সপোজ করবেন না (শুধু ইন্টারনাল নেটওয়ার্কে থাকবে)

  # ─────────────────────────────────
  # ⚡ CACHE — Redis
  # ─────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptoflip-network

  # ─────────────────────────────────
  # 🌐 REVERSE PROXY — Nginx + SSL
  # ─────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - cryptoflip-network

  # ─────────────────────────────────
  # 🔒 CERTBOT — বিনামূল্যে SSL সার্টিফিকেট (Let's Encrypt)
  # ─────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - cryptoflip-network

volumes:
  postgres_data:
  redis_data:
  certbot_webroot:

networks:
  cryptoflip-network:
    driver: bridge
